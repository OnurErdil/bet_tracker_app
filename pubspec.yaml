name: bet_tracker_app
description: "Bet Tracker is a bankroll and betting discipline tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  fl_chart: ^0.66.0
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  min_sdk_android: 23

flutter_native_splash:
  color: "#0B1220"
  image: assets/branding/splash_logo.png
  android: true
  ios: false
  web: false
  android_12:
    color: "#0B1220"
    image: assets/branding/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/branding/

